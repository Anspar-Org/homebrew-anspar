name: Publish Bottles

on:
  pull_request:
    types: [labeled]

jobs:
  publish:
    if: contains(github.event.pull_request.labels.*.name, 'pr-pull')
    runs-on: ubuntu-latest
    outputs:
      package: ${{ steps.pr-info.outputs.package }}
      version: ${{ steps.pr-info.outputs.version }}
    permissions:
      contents: write
      pull-requests: write
      actions: read
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Extract package and version from PR title
        id: pr-info
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          PACKAGE=$(echo "$TITLE" | sed -n 's/^Update \(.*\) to .*/\1/p')
          VERSION=$(echo "$TITLE" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          echo "package=${PACKAGE}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected: ${PACKAGE} v${VERSION}"

      - name: Get build-bottles workflow run
        id: get-run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID=$(gh api \
            "repos/${{ github.repository }}/actions/workflows/build-bottles.yml/runs?head_sha=${{ github.event.pull_request.head.sha }}&status=success&per_page=1" \
            --jq '.workflow_runs[0].id')
          if [ -z "${RUN_ID}" ] || [ "${RUN_ID}" = "null" ]; then
            echo "::error::No successful build-bottles run found for SHA ${{ github.event.pull_request.head.sha }}"
            exit 1
          fi
          echo "run_id=${RUN_ID}" >> "$GITHUB_OUTPUT"
          echo "Found build run: ${RUN_ID}"

      - name: Download bottle artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bottles-*
          merge-multiple: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.get-run.outputs.run_id }}

      - name: Setup tap repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          brew tap ${{ github.repository_owner }}/anspar
          cd "$(brew --repository ${{ github.repository_owner }}/anspar)"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git fetch origin "${{ github.event.pull_request.head.ref }}"
          git checkout "${{ github.event.pull_request.head.ref }}"

      - name: Merge bottle JSON into formula
        run: |
          ls -la *.bottle.json *.tar.gz 2>/dev/null || true
          brew bottle --merge --write --no-commit *.bottle.json

      - name: Rename bottles for GitHub Releases compatibility
        run: |
          # brew test-bot names bottles with double dash (pkg--version)
          # but Homebrew downloads expect single dash (pkg-version) with root_url
          for f in *--*.bottle.tar.gz; do
            newname="${f/--/-}"
            echo "Renaming: $f -> $newname"
            mv "$f" "$newname"
          done

      - name: Create GitHub Release and upload bottles
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE: ${{ steps.pr-info.outputs.package }}
          VERSION: ${{ steps.pr-info.outputs.version }}
        run: |
          TAG="${PACKAGE}-${VERSION}"
          gh release create "${TAG}" \
            --repo "${{ github.repository }}" \
            --title "${PACKAGE} ${VERSION}" \
            --notes "Bottles for ${PACKAGE} ${VERSION}" \
            --latest \
            2>/dev/null || echo "Release ${TAG} already exists"
          gh release upload "${TAG}" *.tar.gz \
            --repo "${{ github.repository }}" \
            --clobber

      - name: Commit updated formula and push
        env:
          PACKAGE: ${{ steps.pr-info.outputs.package }}
          VERSION: ${{ steps.pr-info.outputs.version }}
        run: |
          cd "$(brew --repository ${{ github.repository_owner }}/anspar)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/
          if ! git diff --cached --quiet; then
            git commit -m "bottle: Add bottle for ${PACKAGE} ${VERSION}"
            git push origin "${{ github.event.pull_request.head.ref }}"
          fi

      - name: Merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          for attempt in 1 2 3 4 5; do
            if gh pr merge "${PR_NUMBER}" \
                 --repo "${{ github.repository }}" \
                 --squash \
                 --delete-branch; then
              echo "PR #${PR_NUMBER} merged successfully on attempt ${attempt}"
              exit 0
            fi
            echo "Merge attempt ${attempt}/5 failed, waiting 15s..."
            sleep 15
          done
          echo "::error::Failed to merge PR #${PR_NUMBER} after 5 attempts"
          exit 1

  notify-success:
    name: Slack Notification (success)
    runs-on: ubuntu-latest
    needs: [publish]
    if: always() && needs.publish.result == 'success'

    steps:
      # Required for slack-notify (reads .github/slack-channels.yml).
      - uses: actions/checkout@v4

      - name: Build success message
        id: message
        env:
          PACKAGE: ${{ needs.publish.outputs.package }}
          VERSION: ${{ needs.publish.outputs.version }}
          SERVER_URL: ${{ github.server_url }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          RUN_URL="${SERVER_URL}/${REPOSITORY}/actions/runs/${RUN_ID}"
          PKG="${PACKAGE:-unknown}"
          VER="${VERSION:-unknown}"

          MSG=$(printf '%s\n\n%s\n%s' \
            ":white_check_mark: *${PKG} v${VER} is now available on Homebrew*" \
            "\`brew upgrade ${PKG}\` or \`brew install ${PKG}\`" \
            "*Run:* <${RUN_URL}|View run>")

          {
            echo "text<<EOF"
            echo "$MSG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          # Per-package bookmark slot ("<pkg> latest Homebrew release")
          # so each package keeps its own bookmark in the channel.
          echo "bookmark-title=${PKG} latest Homebrew release" >> "$GITHUB_OUTPUT"

      - name: Send Slack notification
        # Bot scopes required: chat:write, channels:read, channels:join,
        # bookmarks:read, bookmarks:write.
        uses: Cure-HHT/hht_workflows/.github/actions/slack-notify@bfe3d57b66429f300d11496b541c91d2934ceada
        with:
          event: bottle-publish-success
          text: ${{ steps.message.outputs.text }}
          bookmark-title: ${{ steps.message.outputs.bookmark-title }}
          slack-token: ${{ secrets.SLACK_APP_OATH_TOKEN }}

  notify-failure:
    name: Slack Notification (failure)
    runs-on: ubuntu-latest
    needs: [publish]
    if: always() && needs.publish.result == 'failure'

    steps:
      - name: Lookup Slack user (PR author) for DM
        id: slack_user
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_APP_OATH_TOKEN }}
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          EMAIL=$(gh api "users/${AUTHOR}" --jq '.email // empty' 2>/dev/null || echo "")

          if [ -z "$EMAIL" ] || echo "$EMAIL" | grep -q 'noreply'; then
            echo "::warning::No usable email for PR author ${AUTHOR}; failure DM not sent"
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SLACK_RESPONSE=$(curl -s -H "Authorization: Bearer ${SLACK_TOKEN}" \
            "https://slack.com/api/users.lookupByEmail?email=${EMAIL}")

          if [ "$(echo "$SLACK_RESPONSE" | jq -r '.ok')" = "true" ]; then
            echo "user_id=$(echo "$SLACK_RESPONSE" | jq -r '.user.id')" >> "$GITHUB_OUTPUT"
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            ERR=$(echo "$SLACK_RESPONSE" | jq -r '.error // "unknown"')
            echo "::warning::Slack user lookup failed for ${EMAIL}: ${ERR}; failure DM not sent"
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      # DMs target a user ID, not a channel name — the shared
      # slack-notify action only routes named channels, so failure DMs
      # stay on slackapi/slack-github-action.
      - name: Send failure DM
        if: steps.slack_user.outputs.found == 'true'
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_APP_OATH_TOKEN }}
          errors: true
          payload: |
            channel: "${{ steps.slack_user.outputs.user_id }}"
            text: ":rotating_light: *Homebrew publish failed* for ${{ needs.publish.outputs.package }} v${{ needs.publish.outputs.version }}\n\n*PR:* <${{ github.event.pull_request.html_url }}|#${{ github.event.pull_request.number }} ${{ github.event.pull_request.title }}>\n*Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View failed run>"
